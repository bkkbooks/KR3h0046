body:
  text: 墨池璅録卷三明楊慎撰金張天錫君用號錦溪嘗集古名家草書一帖名曰草書韻會其所取厯代諸家漢則章帝史游張芝崔瑗崔寔蔡琰王瞻羅暉張超趙襲張越徐幹魏則曹孟徳少帝髦曹植韋誕虞林劉廙杜畿衛覬蜀則諸葛亮吳則皇象賀邵晉則成帝司馬攸何曾衛瓘衛恒韋昶杜預張華嵇康張翰李式劉環之索靖王允之王導王恬王薈郗鑒郗愔郗儉之郗曇庾淮庾翼楊肇卞壼庾亮王廙謝安衞夫人謝璠伯王羲之王獻之王濛王徽之王渾王戎桓温張翼王珉王珣許静民王洽王敦王述王衍紀瞻王邵王循蔡克王曇沈嘉陸機陸雲温放謝敷謝尚詹思遠劉伶謝萬前趙則劉聰劉曜後魏則崔景伯崔浩崔悦王世弼李思弼劉懋劉仁之庾導裴敬憲宋則劉裕太宗謝靈運孔琳之薄紹之范曄羊諮王敬和邱道䕶張茂度盧循沈約裴松之賀道力羊欣南齊則蕭道成源楷劉岷禇淵江夏王鋒蕭慨王僧䖍王志王慈張融北齊則張景仁趙仲蔣眺梁則武帝王克任昉傅昭蕭子雲劉孝綽丁覘蕭思話陶𢎞景孔敬通蕭確朱异周𢎞讓阮研庾肩吾陳則始興王永陽王江總虞綽沈君理袁憲毛嘉鄭㐰陳逵顧野王蔡景厯王彬王公幹蔡凝伏知道劉顗陳伯智蔡澄陸繕後周則泉元禮王褒隋則煬帝智永智果房彦謙竇慶唐則太宗髙宗則天歐陽詢薛純陀虞世南褚遂良陸柬之鄔彤楊師道魏叔瑜李懐琳杜審言張旭李白賀知章孫過庭王知敬白居易史麟杜牧裴行儉張懐瓘鍾紹京王紹宗裴説韋斌李徳裕吳道𤣥張諲李翺林傑顔真卿栁公權鄭䖍宋令文魏元忠陸希聲張志和韓愈盧知猷蕭俛韓覃王奐之王承規衞秀洪元眘魏悌韓渥景融周㠖李霄張仲謀裴素胡季良鍾離權徐嶠之章孝規張廷範蕭遘并釋九人懐素懐仁髙閑亞栖𧦬光景雲貫休夢龜文楚也五代則杜荀鶴薛存貴楊凝式宋則錢俶蘇舜元蘇舜欽蘇軾黄庭堅米芾杜衍蔡襄周越石蒼舒鍾離景伯金則王競髙士談任詢党世傑趙渢王庭筠趙秉文史公奕王仲元張瑞童王萬慶閑閑居士趙秉文為之序曰草書尚矣由漢而下崔張精其能魏晉以來鍾王擅其美自茲以降代不乏人夫其徘徊閑雅之容飛走流注之勢驚竦峭拔之氣卓犖跌宕之志矯若游龍疾若驚蛇似邪而復直欲斷而還連千態萬狀不可端倪亦閒中之一樂也初明昌間翰林學士承㫖黨文獻公始集數千條修撰黄華王公又附益之兵火散落不可復見今河中大慶闗機察張公君用類以成韻捃摭殆盡用意勤矣將板行以與士大夫共之竊謂通經學道本也書一藝耳然非髙人勝士胸中度世有數百卷書筆下無一㸃塵不能造微入妙君用素工書翰故能成此余猶及見金人板刻其精妙神彩不減法帖至元末好事者又添鮮于樞字改名草書集韻刻已不精洪武中蜀邸又翻刻并趙公序及諸名姓皆去之刻又粗惡重可惜也前輩作事多周詳後輩作事多闕畧信然古人例多能書如管寧人但知其清節而不知其銀鈎之敏茅山碑云劉曜人但知其獰凶而不知其章草之工其書見草書韻㑹又有能書而名不著者後漢錦車馮夫人名嫽善史書僅見西域𫝊張伯髙以書酣身名亞皇象僅見于抱朴子曹蜍李志與右軍同時書亦争衡其人不稱耳北朝有沈含馨隋有丁道䕶與智永齊名曰丁真永草者唐有貝靈該繆師愈鄭預心經草書預草也胡英李邕齊名鄔彤懐素師名武盡禮寧照寺鍾銘賀蘭敏之法門寺碑房璘妻髙氏崇徽公主僅見金石集古録張諲與王維齊名雅善小王見書苑咸工梵書南唐王文秉工小篆不在二徐下又有王逸老善篆與八分其命名有欲抗右軍者不知何氏人疑即文秉也宋有秦子眀榮咨道皆蜀人山谷之友髙述潘岐東坡門客僅傳姓名其餘不傳者又何限也解大紳學士春雨齋讀書評鍾繇書如公孫碩膚赤舄几几王右軍如子之燕居申申天天智永瑤臺雪鶴髙標出羣虞世南如重華在位被袗鼓琴歐陽詢秋霄健翮峭壁雙清褚遂良披沙揀金薛少保寒機夜織顔真卿五丁鑿路栁公權一夫當闗張長史風迴電馳僧懐素雲行雨施李北海樓臺映日花木逢春徐㑹稽怒猊渴驥藏稜出力坡谷言難張從申有入木三分之氣吾聞之子山云米南宫竒逸超邁烟雲卷舒黄山谷清圓妙麗引繩貫珠蘇東坡豐腴悦澤綿裏藏針蔡端眀方正嚴重土偶蒙金趙文敏神眀英傑儀鳳冲霄祥雲捧日康里子山雄劍倚天長虹駕海饒介之卞莊刺虎功倍力省宋克鵬搏九萬須仗扶搖宋仲珩龍駒鳳雛神彩已具詹希元字孟舉新安人獨擅署法署書冠冕莊重俞紫芝名和字子中同江人逮事松雪臨摹子夫擅寵杜叔循名環廬陵人真書清風蘭雪胡子申名布旴江人珊瑚碧樹頗謝琮璜揭平名樞豐城人旱蛟得雨秋鷹入雲凡二十八人評皆當惟評蔡端眀為土偶蒙金殊為失之蔡之字有晉韻在蘇黄米之上又謂宋仲珩為神彩已具似以未成少之亦非也本朝書當以宋克為第一仲珩次之遜志評之已定胡杜揭豈能及哉方遜志先生評書云趙子昂書如程不識將兵號令嚴明不使毫髮出法度外故動無遺失鮮于伯機如漁陽健兒姿體充偉而少韻度康里公如鸞雛出巢神采可愛而頡頏未熟雖俱得重名而趙公髙矣繼三公而作者金華宋仲珩草書如天驥行中原一日千里超澗度險不動氣力雖若不可蹤跡而馳驟必合程度又曰子昂妙在行草奕奕得晉韻度所乏者格力不展子山最善懸腕行草逸邁可喜所乏者沈著不足又題褚遂良書唐太宗哀冊墨蹟云古人嘗使意勝於法後世常法勝於意此書雖六藝之一大儒未嘗不留心墨池璅録卷三
