body:
  text: 墨池璅録卷二明楊慎撰袁昂曰鍾繇之書㸃畫之間多有異趣可謂幽深無際古雅有餘秦漢以來一人而已右軍字似左傳大令字似莊周山谷為此言亦猶東坡以杜子美比司馬遷以江瑤柱比荔枝也墓田丙舍其鍾元常之懿乎霜寒阮生其王右軍之奧乎李陽冰庶子泉銘怡亭刻石二世之詔無是過也李嗣真云黃庭經象飛天仙人洛神賦象凌波神女續書品云樂毅論小中有楷黃庭經楷中有小東方贊五分中有楷方丈洛神賦方丈在五分中力命篇三分畫五分字曹娥碑五分書四分字張長史千字文數字四明屠真卿家藏古帖有之又有蘇才翁所補亦怪逸可喜云索征西筆短意長今人作字大槩筆多而意不足觀祕閣續帖中月儀帖可見晉賢草體虛淡蕭散此為至妙惟獻之綰秋蛇為文皇所笑至唐張旭懷素方作連綿之筆此黃伯思姜堯章之所不取也薄紹之書放縱快利筆道流便二王之後略無其比古草書賦云杜度之後以張為祖以衛為父索范伯叔也二王可為兄弟薄為庶息羊為僕隸其言似誇然確論也智果書合處不減古人然時有僧氣可恨古人所以貴於人品髙也徐浩曰虞得王之筋禇得王之肉歐得王之骨夫鷹隼乏彩而翰飛戾天骨徑而氣健也翬翟備色而翺翔百步肉豐而力沈也若藻耀而髙翔書之鳳皇矣歐虞為鷹隼禇薛為翬翟書之鳳皇非右軍而誰陳景元評歐陽詢字云世皆知其體方而不知其筆圓亦可為歐之闡幽也米元章目栁公權書為惡札如𤣥祕塔銘誠中其譏若隂符經序昔人評為栁書第一實存晉韻下此則馮宿碑亞于廟堂碑非𤣥祕塔銘可同日觀也紫絲靸帖亦佳比之顏當出其上而世未有信豫此說者何所見之不同乎書法之壞自顔真卿始自顔而下終晚唐無晉韻矣至五代李後主始知病之謂顔書有楷法而無佳處正如扠手並足如田舍郎翁耳李之論一出至宋米元章評之曰顔書筆頭如蒸餅大醜惡可厭又曰顔行書可觀真便入俗品米之言雖近風不為無理然能言而行不逮至趙子昂出一洗顔栁之病直以晉人為師右軍之後一人而已榮咨道云禇遂良薛稷栁公權不過名書未得為法書也李北海書雲麾將軍碑為第一其融液屈衍紆徐妍媚一法蘭亭但放筆差增其豪豐體使益其媚如盧詢下朝風度閒雅縈轡回䇿儘有藴藉三郎顧之不覺歎美雲麾碑刻在長安良鄉縣石拓本遠不如也今長安碑已亡惜哉張旭妙于肥藏真妙于瘦然以豫論之瘦易而肥難揚子雲曰女有色書亦有色試以色論詩云碩人其頎左𫝊云美而艷艷長大也漢書載昭君豐容靚飾唐史載楊妃肌體豐艷東坡詩書生老眼省見稀畫圖但見周昉肥知此可以論字矣吕總云懷素揮毫掣電隨手變化李白在開元間不以能書名今其行草不減古人龍江夢餘録載其二帖是也鄭子經論張即之陳讜之書曰速無為所染如深焉雖盧扁無所容其靈矣然則其自知耶知則不為此論足以砭俗倪止父云東坡多卧筆魯直多縱筆米老多曳筆山谷云米元章書如快劒斫陳强弩射札然勢亦窮此似仲由未見夫子時氣象耳米嘗評黃庭堅為描字亦是好勝遇敵也米元章評蔡襄書如少年女子訪雲尋雨體態妖嬈行步緩慢多飾鉛華蘇子美似古人筆徑蔡君謨似古人筆圓徑易而圓難也美而病韻者王著徑而病韻者周越著髙于越多矣王著成都人宋初為侍書今之智永千文著所補也亦可亂真無跡可尋東坡云君謨小字愈小愈妙曼卿大字愈大愈奇李西臺字出羣拔萃肥而不剩肉如世間美女豐肌而神氣清秀者也不然則是世說所謂肉鴨而已其後林和靖學之清徑處尤妙此蓋類其為人東坡詩所謂詩如東野不言寒書似西臺差少肉可與和靖傳神矣徐浩書固多精熟無有異趣殆如倚市之倡塗抹青紅反令人贈金皺眉也虞文靖公曰大德延祐之間稱善書者必歸巴西漁陽吳興巴西謂鄧文原漁陽謂鮮于樞吳興謂趙子昂也以二人先于趙者以齒叙耳鄧書太枯鮮于太俗豈能及子昂萬一耶文靖他日又曰魏晉以來善書者未嘗不通六書之義吳興趙公之書冠天下以其深究六書也此評始為的論黃山谷云近時士大夫罕得古法但弄筆左右纒繞遂號為草書蓋前世已如此今日尤甚張東海名曰能草書每草書鑿字以意自撰左右纒繞如鎮宅符篆文徵明嘗笑之云草書集韻尚未經目何得為名書耶有人問張孔𤾉曰張汝弼草書何如孔𤾉曰熟到極處俗到極處識者以為知言墨池璅録卷二
