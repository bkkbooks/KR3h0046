body:
  text: 墨池璅録卷四明楊慎撰古文如春籀如夏篆如秋𨽻如冬八分行草嵗之餘閏也熊朋來云周公之時未改籀已有六書之教孔子之時已改籀尚存科斗之書事固有用于一時而廢于後世久復蹈襲乃與古符者多矣世有小篆謂李斯所作然黃帝刀布其文已作小篆隸書謂王次仲所創而葛天之金幣文與今𨽻無異臨災人得齊胡公之銅棺有文隱起皆作今篆後漢急就章方有波磔鈎踢而錢譜所載尊盧太昊至帝嚳之金幣文及近世掘得周時鏡銘皆古篆而有鈎踢乃知後世所用者上古已有之今人特以所見為始耳非至論也五代史補云郭忠恕工篆𨽻嘗有人于龍門得鳥迹篆示之忠恕一見輒誦有如宿習余按河津伊關俱有龍門此迹今不知在否好古者試一求之劉正夫云觀今之字如觀文繡觀古之字如觀鍾鼎劉靜能曰鍾王不能變乎蔡雍蔡雍不能變乎籀古今古雖殊其理則一鍾王雖變新竒而不失𨽻古意庾謝蕭阮守法而法在歐虞褚薛竊法而法分降而為黃米諸公之放蕩猶持法外之意周吳輩則慢法矣下而至張即之怪誕百出書怪極矣不有子昂誰能回瀾乎唐僧貫休工篆𨽻荆州守問其筆法休曰此事須登壇而援詎可草草言之此言最中理登壇而援言如人之登髙已至壇上之人一舉手援之而已未加苦功而欲求捷法譬如坐井中而求援上焉有此理耶李頎贈張諲詩小王破體咸支䇿人皆不解破體為何語按徐浩云鍾善真書張稱草聖右軍草行法小王破體皆一時之妙破體謂行書小縱繩墨破右軍之體也夫以小王去右軍不大相遠已號破體今世解學士之畫圈如鎮宅之符張東海之顫筆如風癱之手蓋王氏家奴所不為一世囂然稱之字學至此掃地矣今之笑學書者曰吾學羲獻羲獻當年學誰豫詰之曰為此言者非惟不知書亦不知古今矣羲獻學鍾索鍾索學章草章草本分𨽻分𨽻本篆籀篆籀本科斗遞相祖述豈謂無師耶今不屑步鍾索羲獻之後塵乃甘心為項羽史𢎞肇之髙弟果何見耶先太師公學蕭子雲出師頌李文正公嘗云石齋書真是簡遠但急疾時所書無乃太簡乎先公笑曰夫何遠之有翰苑相傳以為善謔孫虔禮云書字有五乖五合神怡務間一合也感物徇知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也紙墨不稱四乖也情怠手闌五乖也合乖之際優劣互差豫常以其言舉似文徵仲曰古人多以酒生思而此乃遺之徵仲笑曰豫不能飲此言似為豫設管寧别傳云寧字畫若銀鈎茅山碑云管寧銀鈎之敏是也唐朱放詩瓊樹相思何日到銀鈎數字莫為難書家作字省文之例如鳳皇連寫凰但作皇鴛央廟郎亦然其例起于六書建類主聲轉注為義也如一字從一數也從弋聲也而二弎之字皆從弋弋非聲也以弋為建類之聲故可以轉二三而為注鳳以鳥義也從凡聲也而凰字亦從几几非聲也以鳳為建類此於字學末之末者人多習之而不察耳書札於德性相關朱子嘗云即子雲所謂心畫也漢司𨽻楊厥碑􅥎通石門􅥎字洪適亦不識為何字愚按􅥎即鑿字也鑿省作鑿又作􅥎者以辵代隱如匝作匝匹作􅂒匣作陋作陋謂之𨽻變古有此例干祿字書可考洪適蓋以六書求之而不得所謂知常而不知變也唐人書葉法師碑宋人書杜詩禹鑿寒江之句皆以鑿為􅥎蓋師法古而結體密源流遠而意匠深乃為法書若確守六書古人謂之氊裘氣東坡所云鸚哥之學止數言山谷所謂蝦蟇之禪惟一跳也若左纒右繞信手隨心而自號草書又近世東海之流弊矣書雖一藝亦不易哉處州松陽永寧觀李雍書傳云葉法善修此觀欲求雍書隔逺不至乃夜追其魂書之謂之追魂碑蓋神異其事云爾此碑豫曾見其拓本信為超絶或者因傳之與碧落碑事相類南唐升元帖以匱紙摹拓李廷圭墨拂之為絶品匱紙者打金箔紙也其次即用澄心堂紙蟬翅拂為第二品濃墨本為第三品也升元帖在淳化祖刻之上隋開皇帖之下然今皆不可復見矣宋世集帖傳于今者絶少大觀帖蔡京所模豫及見之雪溪堂王庭筠所刻寶晉齋曹日新所刻澄堂帖賀知章所臨皆絶妙祕閣續帖于王宜學處見之又聞其家有鍾山草堂刻梁人書竒徑未之有也皇象天璽石刻雄偉冠世世尚有之古人論墨之佳曰輕堅黝黑入硯無聲又曰其堅如玉其文如犀又曰繢彩奮發論硯之佳曰秀潤王質論筆曰長而不徑不如勿長徑而不圓不如勿徑皆至理也善書者知之宣州陳氏能作筆家傳右軍與其祖求筆帖子孫世精其法唐栁公權求筆于陳氏先與二管語其子曰栁學士如能書當留此筆不爾當退還即可常筆與之未幾栁以不入用别求陳氏遂與常筆陳曰先與者二筆非右軍不能栁信與之逺矣此事見墨藪信乎如來三昧菩薩不知也墨池璅録卷四
