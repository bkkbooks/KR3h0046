body:
  text: 墨池璅録卷一明楊慎撰鍾太傅云多力豐筋者勝無力無筋者病衞夫人云意在筆前者勝意在筆後者敗王羲之筆勢圖云書虛紙用强筆書强紙用弱筆强弱不等則參差不入用用墨者墨不過三分不得深侵毛弱無勢姜白石云真多用摺草多用轉摺欲少駐駐則有力轉不欲直直則不遒然而真以轉而後遒草以摺而後勁不可不知也又曰真貴方草貴圓方者參之以圓圓者㕘之以方斯為妙矣歐陽詢云虛拳直腕指掌齊空分間布白勿令偏側墨淡則傷神彩太濃則滯鋒毫肥則為鈍痩則露骨懐素與鄔彤為友嘗從彤受筆法彤曰張長史私教彤云孤蓬自振驚砂坐飛余自是得奇怪草聖盡于此矣顔真卿曰師亦有自得乎素云吾觀夏雲多奇峰嘗師之其痛快處如飛鳥入林驚蛇入草如遇拆壁之路一一自然真卿曰何如屋漏雨痕素起握真卿手曰得之矣董内直書訣曰無垂不縮無往不收如懸針如折釵如壁拆如屋漏痕如印印泥如錐畫沙左邉短必與上齊右邉短必與下齊左欲去吻右欲去肩指欲實掌欲虚李萃云用筆在乎虚掌而實指緩紉而急送意在筆前字居筆後山谷云心能轉腕手能轉筆書字便如人意又曰大字難于結宻而無間小字難于寛綽而有餘又曰肥字須要有骨痩字須要有肉皆三昧也米元章云字要骨格肉須裹筋筋須藏肉智果心成頌覃心一字功歸自得盈虚統視連行妙在相承起伏張懐瓘云臨仿古帖毫髪精妍隨手變化得魚忘筌晦翁云放意則荒取妍則拙皆得書訣之妙范成大云古人書法字中有筆筆中無鋒乃為極致宋潛溪跋張旭書酒徳頌真跡云出幽入明殆類鬼神雷電余嘗見其千文數字信然張懐瓘云古文篆籀書之祖也都無節角盖欲方而有規圓不失矩如人露筋骨是乃病也夫良工理材斤斧無跡今童蒙有稜角豈謂是哉稜角者書之弊薄也脂肉者書之滓穢也嬰斯病弊須訪良醫丁道䕶襄陽啓法寺碑最精歐虞之所自出北方多朴而有隸體無晉逸謂之氊裘氣盖骨格者書法之祖也態度者書法之餘也氊裘之喻謂少態度耳書法惟風韻難及虞書多粗糙晉人書雖非名法之家亦自奕奕有一種風流藴藉之氣縁當時人物以清簡相尚虛曠為懐修容發語以韻相勝落華散藻自然可觀可以精神解領不可以言語求覔也得形體不若得筆法學字如女子學梳掠惟性虛者尤能作態度也世之學阮研者不得其骨力婉媚惟見攣拳委曲學薄紹之者不得其婉妍淵㣲徒似其經營險急所謂醜女效顰見者必走也行行要有活法字字要求生動小心布置大膽落筆篆尚婉而通隸欲精而宻草貴流而暢真務簡而便此四訣者可謂鯨吞海水盡露出珊瑚枝矣入道于楷僅有三焉化度九成廟堂耳草書有圓無方有直無横山谷云入則重規疊矩出則奔轍絶塵盡書法矣草書尤忌横直分明多則字有積薪束葦之狀而無蕭散簡遠之氣草不兼真殆于専謹真不通草殊非翰理譬之良馬磬控縱送不爾蹶矣古稱鍾繇隸奇張芝草聖孫過庭遂疑其偏不知乃似孟子不言易而善用易也鄭子經云偶寫一字不成須于衆碑中求之不可輕易率爾而作趙子昂所謂必求古人佳様是也趙子固云學唐不如學晉人皆能言之晉豈易學學唐尚不失規矩學晉不從唐入多見其不知量也鍾紹京云智永硯成臼乃能到右軍石穿透始到鍾索也陶貞白云右軍臨鍾跡勝其自運山谷云帖中有張芝書狀二十許行索靖急就章數行清絶痩勁雖王氏父子當歛手者也予觀此論所謂强中自有强中手天下元無第一人信矣今之學書者知有二王而不求二王之上亦未為善學二王者也三代之鼎彛字畫皆妙盖勒之金石垂世𫝊後必托于能者為學古鈎深者謀不為單見淺聞者病也又曰石鼓文筆法如圭璋特達非後人所能贋作熟觀此書可得正書行草法盖王右軍亦云耳又曰周秦古器銘皆科斗文字其文章爾雅朝夕玩之可以披剥華偽自見真情雖戲弄翰墨不為無補又曰李龍眠得金銅㦸于市漢制也泥金六字字家不能讀蟲書妙絶于今諸家未見此一種乃知唐𤣥度僧夢英皆妄作耳又曰草書與科斗篆隸同法同意又曰大王昨遂不奉深恨帖有秦漢篆筆姜䕫云真行草書之法圓勁古淡則出于蟲篆㸃畫波磔則出於八分轉換向背則出於飛白簡便痛快則出于章草合黄與姜之言觀之學書者必先乎此所謂乗槎直入斗牛宫不但窮河源而已不然是弄潢池而承榼霤豈有驚人之波瀾耶梁武帝云衆家可識亦當復由串耳六文可工亦當復由習耳程邈所以能變書體為之舊也張芝所以能盡書勢學之積也既舊且積方可以肆其談有功無性神彩不生有性無功神彩不實雷太簡云聽江聲而筆法進文與可亦言見蛇鬭而草書長墨池璅録卷一
