body:
  text: 墨池璅録藝術類一書畫之屬提要臣等謹案墨池璅録四卷明楊慎撰王世貞名賢遺墨跋曰慎以博學名世書亦自負吳興堂廡世𫝊其謫戍雲南時嘗醉傅胡粉作雙髻插花諸伎擁之游行成市或以精白綾作裓遺諸伎服之酒間乞書醉墨淋漓人每購歸裝潢成卷蓋慎亦究心書學者此書頗抑顔真卿而謂米芾行不逮言至趙孟俯出始一洗顔栁之病直以晉人為師右軍之後一人而已與王世貞吳興堂廡之說合知其確出慎手中間或採舊文或抒己意往往皆心得之言其述張天錫草書韻㑹源流及小王破體書漢司𨽻楊厥碑􅂒字之類亦兼有考證云乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4a21eea60225192e47ff4c2458945241def29b47cf0c154be6ef224c8db2a849
